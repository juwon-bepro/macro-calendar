<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Macro Calendar | 미국 거시경제 달력</title>
<style>
:root {
  --bg: #0c0f1a;
  --bg2: #141828;
  --bg3: #1c2238;
  --bg4: #242a42;
  --border: #2a3050;
  --border2: #353d5e;
  --txt: #e4e8f5;
  --txt2: #8a94b8;
  --txt3: #555f80;
  --blue: #4f8ef7;
  --blue2: rgba(79,142,247,0.12);
  --green: #00d09c;
  --green2: rgba(0,208,156,0.12);
  --red: #ff4d5e;
  --red2: rgba(255,77,94,0.12);
  --gold: #f5a623;
  --gold2: rgba(245,166,35,0.12);
  --purple: #a78bfa;
  --purple2: rgba(167,139,250,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.site-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-logo{width:38px;height:38px;background:linear-gradient(135deg,#4f8ef7,#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.hdr-title h1{font-size:17px;font-weight:700;letter-spacing:-0.2px;}
.hdr-title p{font-size:11px;color:var(--txt3);margin-top:1px;}
.hdr-right{display:flex;gap:24px;align-items:center;}
.hdr-stat{text-align:right;}
.hdr-stat-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.5px;display:block;}
.hdr-stat-val{font-size:15px;font-weight:700;color:var(--txt);}
.hdr-stat-val.rate{color:var(--gold);}
.hdr-next{font-size:12px;color:var(--txt2);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}

/* CONTAINER */
.container{max-width:1360px;margin:0 auto;padding:24px 20px;}

/* CALENDAR HEADER */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.cal-nav{display:flex;align-items:center;gap:12px;}
.nav-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;}
.nav-btn:hover{background:var(--bg4);color:var(--txt);}
.cal-title{font-size:22px;font-weight:700;min-width:160px;text-align:center;}
.today-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:12px;font-weight:500;transition:all 0.15s;}
.today-btn:hover{background:var(--blue);border-color:var(--blue);color:#fff;}
.cal-filters{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--txt3);cursor:pointer;font-size:11px;font-weight:500;transition:all 0.15s;white-space:nowrap;}
.filter-btn:hover{color:var(--txt2);border-color:var(--border2);}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.filter-btn.active.fomc{background:var(--gold);border-color:var(--gold);}
.filter-btn.active.employment{background:var(--green);border-color:var(--green);color:#0a2a1f;}
.filter-btn.active.inflation{background:var(--red);border-color:var(--red);}

/* LEGEND */
.legend{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3);}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* CALENDAR GRID */
.cal-grid{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg3);border-bottom:1px solid var(--border);}
.day-hdr{padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:0.4px;}
.day-hdr.sun,.day-hdr.sat{color:var(--txt3);opacity:0.7;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.day-cell{min-height:108px;padding:7px 6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;vertical-align:top;}
.day-cell:nth-child(7n){border-right:none;}
.day-cell.other-month{opacity:0.28;pointer-events:none;}
.day-cell.today{background:rgba(79,142,247,0.04);}
.day-cell.weekend .day-num{color:var(--txt3);}
.day-num{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.today-circle{width:19px;height:19px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

/* EVENT CHIPS */
.event-chip{display:flex;align-items:center;gap:3px;padding:3px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;transition:all 0.15s;font-size:10.5px;font-weight:500;line-height:1.3;border:1px solid transparent;max-width:100%;overflow:hidden;}
.event-chip:hover{transform:translateX(2px);filter:brightness(1.15);}
.event-chip .imp{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.imp.high{background:var(--red);}
.imp.medium{background:var(--gold);}
.imp.low{background:var(--blue);}
.chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.chip-val{font-weight:700;white-space:nowrap;flex-shrink:0;font-size:10px;}

/* chip color variants */
.chip-beat{background:var(--green2);border-color:rgba(0,208,156,0.25);color:var(--green);}
.chip-miss{background:var(--red2);border-color:rgba(255,77,94,0.25);color:var(--red);}
.chip-inline{background:rgba(100,110,145,0.15);border-color:rgba(100,110,145,0.25);color:var(--txt2);}
.chip-upcoming{background:var(--blue2);border-color:rgba(79,142,247,0.25);color:var(--blue);}
.chip-fomc{background:var(--gold2);border-color:rgba(245,166,35,0.3);color:var(--gold);}

.more-chip{font-size:10px;color:var(--txt3);cursor:pointer;padding:1px 3px;border-radius:3px;margin-top:1px;display:inline-block;}
.more-chip:hover{color:var(--txt2);background:var(--bg4);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:16px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;transform:translateY(16px) scale(0.98);transition:transform 0.2s;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.modal-hdr{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:flex-start;}
.modal-hdr-left{flex:1;}
.modal-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
.modal-name{font-size:19px;font-weight:700;line-height:1.2;margin-bottom:4px;}
.modal-name-ko{font-size:12px;color:var(--txt2);}
.modal-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:background 0.15s;}
.modal-close:hover{background:var(--bg4);}
.modal-body{padding:18px 22px;}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.stat-box-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px;}
.stat-box-val{font-size:19px;font-weight:700;}
.stat-box-val.beat{color:var(--green);}
.stat-box-val.miss{color:var(--red);}
.stat-box-val.neutral{color:var(--txt);}
.stat-box-val.upcoming{color:var(--blue);}
.stat-box-val.fomc-val{color:var(--gold);}
.result-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-top:5px;letter-spacing:0.3px;}
.rb-beat{background:var(--green2);color:var(--green);}
.rb-miss{background:var(--red2);color:var(--red);}
.rb-inline{background:rgba(100,110,145,0.15);color:var(--txt2);}

.modal-desc{background:var(--bg2);border-radius:10px;padding:13px 15px;margin-bottom:16px;font-size:12px;color:var(--txt2);line-height:1.65;}
.modal-link{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);text-decoration:none;font-size:12px;font-weight:500;margin-bottom:18px;transition:all 0.15s;}
.modal-link:hover{border-color:var(--blue);color:var(--blue);background:var(--blue2);}
.modal-link svg{flex-shrink:0;}

/* VOTING */
.vote-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px 16px;}
.vote-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.vote-title{font-size:13px;font-weight:700;}
.vote-badge-closed{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(100,110,145,0.15);color:var(--txt3);font-weight:600;}
.vote-sub{font-size:11px;color:var(--txt3);margin-bottom:14px;}
.vote-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.vote-btn{padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.15s;}
.vote-btn:hover:not(:disabled){background:var(--bg4);}
.vote-btn:disabled{cursor:default;opacity:0.6;}
.vote-btn .vico{font-size:17px;}
.vote-btn.active-high{background:var(--green2);border-color:var(--green);color:var(--green);}
.vote-btn.active-low{background:var(--red2);border-color:var(--red);color:var(--red);}
.vote-btn.active-inline{background:rgba(100,110,145,0.2);border-color:var(--border2);color:var(--txt);}
.vote-results{}
.vr-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.vr-label{font-size:11px;font-weight:600;width:50px;flex-shrink:0;}
.vr-label.high{color:var(--green);}
.vr-label.low{color:var(--red);}
.vr-label.inline{color:var(--txt2);}
.vr-track{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.vr-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.vr-fill.high{background:var(--green);}
.vr-fill.low{background:var(--red);}
.vr-fill.inline{background:var(--border2);}
.vr-pct{font-size:11px;font-weight:700;width:34px;text-align:right;flex-shrink:0;}
.vr-pct.high{color:var(--green);}
.vr-pct.low{color:var(--red);}
.vr-pct.inline{color:var(--txt2);}
.vr-total{font-size:10px;color:var(--txt3);text-align:right;margin-top:6px;}
.community-result{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600;text-align:center;}
.cr-right{background:var(--green2);color:var(--green);}
.cr-wrong{background:var(--red2);color:var(--red);}

/* CATEGORY COLORS */
.cat-fomc{color:var(--gold);}
.cat-employment{color:var(--green);}
.cat-inflation{color:var(--red);}
.cat-growth{color:var(--blue);}
.cat-housing{color:var(--purple);}
.cat-consumer{color:#f472b6;}
.cat-manufacturing{color:#38bdf8;}
.cat-trade{color:#34d399;}

/* SCROLLBAR */
html{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

@media(max-width:768px){
  .container{padding:12px;}
  .day-cell{min-height:72px;padding:4px 3px;}
  .event-chip{font-size:9.5px;padding:2px 4px;}
  .hdr-right{display:none;}
  .cal-filters{display:none;}
  .cal-title{font-size:18px;}
}
</style>
</head>

    <div class="cal-body" id="calBody"></div>

</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">

  if(getUserVote(ev.id)) return;
  localStorage.setItem('uv_'+ev.id, choice);
  const counts = getVoteCounts(ev);
  counts[choice]++;
  localStorage.setItem('vc_'+ev.id, JSON.stringify(counts));
}

  `).join('');

  activeFilter = f;

/* ===== RENDER CALENDAR ===== */
function renderCalendar(){
  document.getElementById('calTitle').textContent = `${viewYear}년 ${MONTHS_KO[viewMonth]}`;

  // Day headers
  const dh = document.getElementById('dayHeaders');
  dh.innerHTML = DAYS_KO.map((d,i)=>`<div class="day-hdr ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');

  // Get events for this month view
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

  let cells = [];
  for(let i=firstDay-1;i>=0;i--) cells.push({d:new Date(viewYear,viewMonth-1,daysInPrev-i),other:true});
  for(let d=1;d<=daysInMonth;d++) cells.push({d:new Date(viewYear,viewMonth,d),other:false});
  while(cells.length<42) cells.push({d:new Date(viewYear,viewMonth+1,cells.length-firstDay-daysInMonth+1),other:true});

  const body = document.getElementById('calBody');
  body.innerHTML = cells.map(c=>renderDayCell(c)).join('');
}

function dateStr(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function isToday(d){
  return d.getFullYear()===TODAY.getFullYear()&&d.getMonth()===TODAY.getMonth()&&d.getDate()===TODAY.getDate();
}

function isWeekend(d){return d.getDay()===0||d.getDay()===6;}

function getEventsForDate(d){
  const ds = dateStr(d);
  return EVENTS.filter(e=>e.date===ds && (activeFilter==='all'||e.category===activeFilter));
}

function chipClass(ev){
  if(ev.category==='fomc') return 'chip-fomc';
  if(!ev.released) return 'chip-upcoming';
  if(ev.beat==='beat') return 'chip-beat';
  if(ev.beat==='miss') return 'chip-miss';
  return 'chip-inline';
}

function chipVal(ev){
  if(!ev.released) return '';
  return ev.actual||'';
}

function renderDayCell({d,other}){
  const evs = getEventsForDate(d);
  const today = isToday(d);
  const weekend = isWeekend(d);
  const cls = [
    'day-cell',
    other?'other-month':'',
    today?'today':'',
    weekend?'weekend':''
  ].filter(Boolean).join(' ');

  const MAX_CHIPS = 3;
  const shown = evs.slice(0,MAX_CHIPS);
  const extra = evs.length - MAX_CHIPS;

  const dayNumHtml = today
    ? `<div class="day-num"><div class="today-circle">${d.getDate()}</div></div>`
    : `<div class="day-num">${d.getDate()}</div>`;

  const chipsHtml = shown.map(ev=>`
    <div class="event-chip ${chipClass(ev)}" onclick="openModal('${ev.id}')">
      <span class="imp ${ev.importance}"></span>
      <span class="chip-name">${ev.name.split(' ').slice(0,3).join(' ')}</span>
      ${chipVal(ev)?`<span class="chip-val">${chipVal(ev)}</span>`:''}
    </div>
  `).join('');

  const moreHtml = extra>0
    ? `<span class="more-chip" onclick="showAllDay('${dateStr(d)}')">+${extra}개 더</span>`
    : '';

  return `<div class="${cls}">${dayNumHtml}${chipsHtml}${moreHtml}</div>`;
}

async function fredFetch(series, limit=15){
  try{
    const url=`https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=${limit}`;
    const r=await fetch(url);
    if(!r.ok) return [];
    const d=await r.json();
    return (d.observations||[]).filter(o=>o.value!='.');
  }catch(e){return [];}
}

function getByRef(obs,ref){return obs.find(o=>o.date.startsWith(ref));}

function momPct(obs,ref){
  const s=[...obs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const i=s.findIndex(o=>o.date.startsWith(ref));
  if(i<0||i>=s.length-1) return null;
  return (parseFloat(s[i].value)/parseFloat(s[i+1].value)-1)*100;
}

function yoyPct(obs,ref){
  const cur=obs.find(o=>o.date.startsWith(ref));
  if(!cur) return null;
  const d=new Date(ref+'-01'); d.setFullYear(d.getFullYear()-1);
  const prv=obs.find(o=>o.date.startsWith(d.toISOString().slice(0,7)));
  if(!prv) return null;
  return (parseFloat(cur.value)/parseFloat(prv.value)-1)*100;
}

function momChange(obs,ref){
  const s=[...obs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const i=s.findIndex(o=>o.date.startsWith(ref));
  if(i<0||i>=s.length-1) return null;
  return parseFloat(s[i].value)-parseFloat(s[i+1].value);
}

function beatDir(cur,prv,dir){
  const diff=cur-prv;
  if(Math.abs(diff)<Math.abs(prv)*0.003) return 'inline';
  return (dir==='high'?diff>0:diff<0)?'beat':'miss';
}

async function initFREDData(){
  const statusEl=document.getElementById('fredStatus');
  statusEl.textContent='⟳ FRED 데이터 로딩 중...';
  const today=new Date();

  // Filter to released events only
  const toFetch=FRED_MAP.filter(m=>{
    const ev=EVENTS.find(e=>e.id===m.id);
    return ev&&new Date(ev.date+'T23:59:59')<=today;
  });

  // Batch-fetch unique series
  const seriesSet=[...new Set(toFetch.map(m=>m.series))];
  const cache={};
  await Promise.all(seriesSet.map(async s=>{cache[s]=await fredFetch(s,15);}));

  // Update header Fed Funds Rate
  const ffr=await fredFetch('DFEDTARU',2);
  if(ffr.length>0){
    const el=document.querySelector('.hdr-stat-val.rate');
    if(el) el.textContent=`${parseFloat(ffr[0].value).toFixed(2)}%`;
  }

  // Process each event
  for(const m of toFetch){
    const obs=cache[m.series]||[];
    if(!obs.length) continue;
    const ev=EVENTS.find(e=>e.id===m.id);
    if(!ev) continue;
    let raw=null, rawPrv=null;
    try{
      const s=[...obs].sort((a,b)=>new Date(b.date)-new Date(a.date));
      if(m.calc==='direct'){
        const o=getByRef(obs,m.ref); if(!o) continue;
        raw=parseFloat(o.value);
        const i=s.findIndex(x=>x.date.startsWith(m.ref));
        if(i>=0&&i<s.length-1) rawPrv=parseFloat(s[i+1].value);
      } else if(m.calc==='mom_pct'){
        raw=momPct(obs,m.ref);
        const i=s.findIndex(x=>x.date.startsWith(m.ref));
        if(i>=0&&i+2<s.length) rawPrv=(parseFloat(s[i+1].value)/parseFloat(s[i+2].value)-1)*100;
      } else if(m.calc==='yoy_pct'){
        raw=yoyPct(obs,m.ref);
        const d=new Date(m.ref+'-01'); d.setMonth(d.getMonth()-1);
        rawPrv=yoyPct(obs,d.toISOString().slice(0,7));
      } else if(m.calc==='mom_change'){
        raw=momChange(obs,m.ref);
        const i=s.findIndex(x=>x.date.startsWith(m.ref));
        if(i>=0&&i+2<s.length) rawPrv=parseFloat(s[i+1].value)-parseFloat(s[i+2].value);
      } else if(m.calc==='direct_n'){
        const n=(m.n||1)-1;
        if(s.length>n){ raw=parseFloat(s[n].value); }
        if(s.length>n+1){ rawPrv=parseFloat(s[n+1].value); }
      }
    }catch(e){continue;}
    if(raw===null||isNaN(raw)) continue;
    ev.actual=m.fmt(raw);
    ev.released=true;
    ev.beat=(rawPrv!==null&&!isNaN(rawPrv))?beatDir(raw,rawPrv,m.dir):'inline';
    if(rawPrv!==null&&!isNaN(rawPrv)){try{ev.previous=m.fmt(rawPrv);}catch(e){}}
  }

  statusEl.textContent='✓ FRED 실시간 데이터';
  renderCalendar();
  if(activeEvent){const upd=EVENTS.find(e=>e.id===activeEvent.id);if(upd)renderModal(upd);}
}

/* ===== INIT ===== */
renderFilters();
renderCalendar();
initFREDData();
</script>
</body>
